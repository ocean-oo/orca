name: Publish @stablyai/orca-server

# Publishes the headless, Electron-free Orca runtime server to npm.
#
# Builds the node-pty prebuilt matrix (the one ABI-sensitive native module) across
# linux x64/arm64 (glibc + musl) and macOS x64/arm64, collects them into the
# server bundle, verifies the tarball, then publishes @stablyai/orca-server.
#
# Trigger: push a tag `orca-server-v<version>` or run manually.
# Auth: NODE_AUTH_TOKEN from the NPM_TOKEN repo secret (must exist in this repo,
# same as stablyai/stably's release-cli). Set release_type=rc for a prerelease
# published under the `alpha` dist-tag; omit (or 'release') for a normal publish.

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (rc → published under the alpha tag)'
        required: false
        type: choice
        options: ['', rc, release]
        default: ''
  push:
    tags:
      - 'orca-server-v*'

permissions:
  contents: read

env:
  NODE_VERSION: 24
  PNPM_VERSION: 10.24.0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  # ---- Build one node-pty prebuilt slot per platform/arch/libc ----
  prebuilds:
    if: github.repository == 'stablyai/orca'
    strategy:
      fail-fast: true
      matrix:
        include:
          - { runner: ubuntu-latest,    slot: linux-x64-glibc,   kind: glibc }
          - { runner: ubuntu-24.04-arm, slot: linux-arm64-glibc, kind: glibc }
          - { runner: ubuntu-latest,    slot: linux-x64-musl,    kind: musl }
          - { runner: ubuntu-24.04-arm, slot: linux-arm64-musl,  kind: musl }
          - { runner: macos-14,         slot: darwin-arm64,      kind: darwin }
          - { runner: macos-13,         slot: darwin-x64,        kind: darwin }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      # glibc + darwin: build natively on the host runner.
      - name: Build prebuilt (host toolchain)
        if: matrix.kind != 'musl'
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y build-essential python3
          fi
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate
          npm install -g node-gyp@11.5.0
          echo "npm_config_node_gyp=$(npm root -g)/node-gyp/bin/node-gyp.js" >> "$GITHUB_ENV"
          pnpm install --no-frozen-lockfile --prefer-frozen-lockfile=false
          node config/scripts/build-server-prebuilds.mjs --slot=${{ matrix.slot }}

      # musl: build inside an Alpine container (checkout already done on host —
      # GH cannot run JS actions in an Alpine container on arm64 runners).
      - name: Build prebuilt (musl / Alpine container)
        if: matrix.kind == 'musl'
        run: |
          docker run --rm -v "$PWD":/w -w /w node:24-alpine sh -euc '
            apk add --no-cache build-base python3 git bash >/dev/null
            corepack enable
            corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate
            pnpm install --no-frozen-lockfile --prefer-frozen-lockfile=false
            node config/scripts/build-server-prebuilds.mjs --slot=${{ matrix.slot }}
          '

      - name: Show prebuilt
        run: |
          ls -la out/server/prebuilds/${{ matrix.slot }}/
          file out/server/prebuilds/${{ matrix.slot }}/pty.node || true

      - name: Upload prebuilt slot
        uses: actions/upload-artifact@v4
        with:
          name: orca-server-prebuilt-${{ matrix.slot }}
          path: out/server/prebuilds/${{ matrix.slot }}/**
          if-no-files-found: error

  # ---- Collect all slots, build the bundle, verify the tarball, publish ----
  publish:
    needs: prebuilds
    if: github.repository == 'stablyai/orca'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --prefer-frozen-lockfile=false

      - name: Build server bundle (electron-free)
        run: pnpm run build:server

      - name: Download all prebuilt slots
        uses: actions/download-artifact@v4
        with:
          pattern: orca-server-prebuilt-*
          path: /tmp/prebuilts

      - name: Assemble prebuilds into the bundle dir
        run: |
          mkdir -p out/server/prebuilds
          for d in /tmp/prebuilts/orca-server-prebuilt-*; do
            slot="${d##*/orca-server-prebuilt-}"
            mkdir -p "out/server/prebuilds/$slot"
            cp -r "$d"/* "out/server/prebuilds/$slot/"
          done
          echo "Assembled slots:"; ls out/server/prebuilds

      - name: Set version (RC under alpha tag, else package version)
        id: ver
        run: |
          BASE=$(node -p "require('./out/server/package.json').version")
          if [ "${{ inputs.release_type }}" = "rc" ]; then
            ALL=$(npm view @stablyai/orca-server versions --json 2>/dev/null || echo "[]")
            N=0; while echo "$ALL" | grep -q "\"${BASE}-rc.${N}\""; do N=$((N+1)); done
            V="${BASE}-rc.${N}"; echo "tag=alpha" >> "$GITHUB_OUTPUT"
          else
            V="$BASE"; echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          node -e "const fs=require('fs');const p='out/server/package.json';const j=JSON.parse(fs.readFileSync(p));j.version='$V';fs.writeFileSync(p,JSON.stringify(j,null,2))"
          echo "Publishing @stablyai/orca-server@$V"

      - name: Verify tarball ships bundle + all prebuilts (incl. spawn-helper)
        working-directory: out/server
        run: |
          TARBALL=$(npm pack --pack-destination /tmp | tail -n1)
          echo "tarball: $TARBALL"
          LIST=$(tar -tzf "/tmp/$TARBALL")
          echo "$LIST" | grep -q '^package/orca.js$' || { echo "MISSING CLI bundle"; exit 1; }
          echo "$LIST" | grep -q '^package/orca-server.js$' || { echo "MISSING bundle"; exit 1; }
          echo "$LIST" | grep -q '^package/scripts/install-node-pty-prebuilt.mjs$' || { echo "MISSING installer"; exit 1; }
          for slot in linux-x64-glibc linux-arm64-glibc linux-x64-musl linux-arm64-musl darwin-arm64 darwin-x64; do
            echo "$LIST" | grep -q "^package/prebuilds/$slot/pty.node$" || { echo "MISSING $slot/pty.node"; exit 1; }
          done
          # spawn-helper is required on every Unix slot (node-pty posix_spawns it)
          for slot in linux-x64-glibc linux-arm64-glibc linux-x64-musl linux-arm64-musl darwin-arm64 darwin-x64; do
            echo "$LIST" | grep -q "^package/prebuilds/$slot/spawn-helper$" || { echo "MISSING $slot/spawn-helper"; exit 1; }
          done
          echo "✓ tarball contains bundle, installer, and all 6 prebuilt slots"

      - name: Publish to npm
        working-directory: out/server
        run: npm publish --access public --tag ${{ steps.ver.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
